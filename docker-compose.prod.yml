version: "3.9"

# Basilica — Production Compose (ST-GABRIEL)
# Deploy with: scripts/deploy.sh
# Images are pulled from ghcr.io — built by GitHub Actions CI

services:
  postgres:
    image: postgres:16
    container_name: basilica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: basilica
    volumes:
      - basilica-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: basilica-qdrant
    restart: unless-stopped
    volumes:
      - basilica-qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  openclaw:
    image: ghcr.io/signatureofgod2018/basilica/openclaw:latest
    container_name: basilica-openclaw
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/basilica
      QDRANT_URL: http://qdrant:6333
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      NODE_ENV: production
    ports:
      - "4000:4000"

  dashboard:
    image: ghcr.io/signatureofgod2018/basilica/dashboard:latest
    container_name: basilica-dashboard
    restart: unless-stopped
    depends_on:
      - openclaw
    ports:
      - "3000:80"

volumes:
  basilica-postgres-data:
  basilica-qdrant-data:
