version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: basilica-postgres
    environment:
      POSTGRES_USER: basilica
      POSTGRES_PASSWORD: basilica
      POSTGRES_DB: basilica
    ports:
      - "5432:5432"
    volumes:
      - basilica-postgres-data:/var/lib/postgresql/data
      - ./packages/storage/migrations:/docker-entrypoint-initdb.d

  qdrant:
    image: qdrant/qdrant:latest
    container_name: basilica-qdrant
    ports:
      - "6333:6333"
    volumes:
      - basilica-qdrant-data:/qdrant/storage

volumes:
  basilica-postgres-data:
  basilica-qdrant-data:
